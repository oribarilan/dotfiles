set-option -g status-position top

# Enable 2-line status bar: line 0 = sessions, line 1 = windows/modules
set -g status 2

# Refresh status more frequently (for session list updates)
set -g status-interval 5

# --- Session navigation ---
bind [ switch-client -p    # previous session
bind ] switch-client -n    # next session
bind 1 run-shell "tmux switch-client -t $(tmux list-sessions -F '#S' | sed -n '1p')"
bind 2 run-shell "tmux switch-client -t $(tmux list-sessions -F '#S' | sed -n '2p')"
bind 3 run-shell "tmux switch-client -t $(tmux list-sessions -F '#S' | sed -n '3p')"
bind 4 run-shell "tmux switch-client -t $(tmux list-sessions -F '#S' | sed -n '4p')"
bind 5 run-shell "tmux switch-client -t $(tmux list-sessions -F '#S' | sed -n '5p')"
bind 6 run-shell "tmux switch-client -t $(tmux list-sessions -F '#S' | sed -n '6p')"
bind 7 run-shell "tmux switch-client -t $(tmux list-sessions -F '#S' | sed -n '7p')"
bind 8 run-shell "tmux switch-client -t $(tmux list-sessions -F '#S' | sed -n '8p')"
bind 9 run-shell "tmux switch-client -t $(tmux list-sessions -F '#S' | sed -n '9p')"

# --- Line 0 (top): session pills ---
# Styled to match catppuccin rounded window tabs using #{S:} session iteration.
# Active session: mauve pill (like current window), Inactive: overlay_2 pill (like default window)
# Uses range=session for mouse click support.
# Catppuccin mocha colors hardcoded since #{S:} doesn't expand @thm_* inside conditionals.
#   mantle=#181825  crust=#11111b  fg=#cdd6f4
#   mauve=#cba6f7  (active)  overlay_2=#9399b2  (inactive)
set -g status-format[0] "#[align=left bg=#181825]#{S:#[range=session|#{session_id} #{?#{==:#{session_name},#{client_session}},fg=#cba6f7 bg=#181825,fg=#9399b2 bg=#181825}]#{?#{==:#{session_name},#{client_session}},#[fg=#cba6f7 bg=#181825]#[fg=#11111b bg=#cba6f7] #S #[fg=#cba6f7 bg=#181825],#[fg=#9399b2 bg=#181825]#[fg=#11111b bg=#9399b2] #S #[fg=#9399b2 bg=#181825]}#[norange default bg=#181825] }"

# --- Line 1 (bottom): zoom flag + windows + right modules ---
# Replicates tmux's default status-format[0] structure so catppuccin styling is picked up.
set -g status-format[1] "#[align=left range=left #{E:status-left-style}]#[push-default]#{T;=/#{status-left-length}:status-left}#[pop-default]#[norange default]#[list=on align=#{status-justify}]#[list=left-marker]<#[list=right-marker]>#[list=on]#{W:#[range=window|#{window_index} #{E:window-status-style}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},}#{?#{&&:#{window_activity_flag},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}]#[push-default]#{T:window-status-format}#[pop-default]#[norange default] ,#[range=window|#{window_index} list=focus #{?#{!=:#{E:window-status-current-style},default},#{E:window-status-current-style},#{E:window-status-style}}]#[push-default]#{T:window-status-current-format}#[pop-default]#[norange default] }#[nolist align=right range=right #{E:status-right-style}]#[push-default]#{T;=/#{status-right-length}:status-right}#[pop-default]#[norange default]"

# Only show windows when session has >1 window (override catppuccin's window-status-format)
set -gF window-status-format "#{?#{==:#{session_windows},1},,#{E:window-status-format}}"
set -gF window-status-current-format "#{?#{==:#{session_windows},1},,#{E:window-status-current-format}}"

# Left: zoom flag only (sessions are on line 0)
set -g status-left-length 200
set -g status-left "#{?window_zoomed_flag, ZOOMED ,}"

# Right: application + uptime
set -g status-right-length 100
set -g status-right "#{E:@catppuccin_status_application}"
# set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
# set -agF status-right "#{E:@catppuccin_status_battery}"
