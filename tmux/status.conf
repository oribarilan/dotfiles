set-option -g status-position top

# Single-line status bar
set -g status on

# Refresh status more frequently (for session list updates)
set -g status-interval 5

# --- Session navigation ---
# Alt+, / Alt+. for prev/next, Alt+1..9 for direct jump (no prefix needed)
# Alt+n to create new session (prompts for name), Alt+q to kill current session
bind -n M-, switch-client -p
bind -n M-. switch-client -n
bind -n M-n command-prompt -p "New session name:" "new-session -s '%%'"
bind -n M-q confirm-before -p "Kill session #{session_name}? (y/n)" "kill-session"
bind -n M-1 run-shell "tmux switch-client -t $(tmux list-sessions -F '##S' | sed -n '1p')"
bind -n M-2 run-shell "tmux switch-client -t $(tmux list-sessions -F '##S' | sed -n '2p')"
bind -n M-3 run-shell "tmux switch-client -t $(tmux list-sessions -F '##S' | sed -n '3p')"
bind -n M-4 run-shell "tmux switch-client -t $(tmux list-sessions -F '##S' | sed -n '4p')"
bind -n M-5 run-shell "tmux switch-client -t $(tmux list-sessions -F '##S' | sed -n '5p')"
bind -n M-6 run-shell "tmux switch-client -t $(tmux list-sessions -F '##S' | sed -n '6p')"
bind -n M-7 run-shell "tmux switch-client -t $(tmux list-sessions -F '##S' | sed -n '7p')"
bind -n M-8 run-shell "tmux switch-client -t $(tmux list-sessions -F '##S' | sed -n '8p')"
bind -n M-9 run-shell "tmux switch-client -t $(tmux list-sessions -F '##S' | sed -n '9p')"

# --- Single status line using status-format[0] ---
# Left: zoom flag + session pills (catppuccin rounded style, clickable)
# Right: catppuccin modules (application + uptime)
# Catppuccin mocha colors:
#   mantle=#181825  crust=#11111b  mauve=#cba6f7  overlay_2=#9399b2  yellow=#f9e2af
set -g status-format[0] "\
#[align=left bg=#181825]\
#{?window_zoomed_flag,#[fg=#f9e2af bold] ZOOMED #[default bg=#181825],}\
#{S:\
#[range=session|#{session_id}]\
#{?#{==:#{session_name},#{client_session}},\
#[fg=#cba6f7 bg=#181825]#[fg=#11111b bg=#cba6f7] #S #[fg=#cba6f7 bg=#181825],\
#[fg=#9399b2 bg=#181825]#[fg=#11111b bg=#9399b2] #S #[fg=#9399b2 bg=#181825]}\
#[norange default bg=#181825] }\
#[align=right]\
#{E:@catppuccin_status_application}\
#{E:@catppuccin_status_uptime}"

# Hide default status-left/right (everything is in status-format[0])
set -g status-left ""
set -g status-right ""
set -g status-right-length 0
set -g status-left-length 0

# Only show windows when session has >1 window (override catppuccin's window-status-format)
set -gF window-status-format "#{?#{==:#{session_windows},1},,#{E:window-status-format}}"
set -gF window-status-current-format "#{?#{==:#{session_windows},1},,#{E:window-status-current-format}}"
