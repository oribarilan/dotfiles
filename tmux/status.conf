# Sessionbar — custom tmux status line showing sessions as navigable pills.
# Replaces the default window-centric status with a session-centric one,
# since each session uses a single window with multi-pane splits.
#
# Navigation:
#   Alt+, / Alt+.    prev/next session
#   Alt+1..9         jump to session by position
#   C-a 1..9         swap focused session to that position
#   C-a s            sort sessions by recency (most recently used first)
#   Alt+n            create new session (prompts for name)
#   Alt+q            kill current session (with confirmation)

set-option -g status-position top
set -g status on
set -g status-interval 10  # for CPU/memory/disk refresh on the right side

# --- Session order helper ---
%hidden SESSION_ORDER="~/.config/dotfiles/tmux/scripts/session-order.sh"

# --- Session navigation ---
bind -n M-, run-shell "$SESSION_ORDER prev"
bind -n M-. run-shell "$SESSION_ORDER next"
bind -n M-n command-prompt -p "New session name:" "new-session -s '%%'"
bind -n M-q confirm-before -p "Kill session #{session_name}? (y/n)" "kill-session"

# Jump to session by custom order position (Alt+1..9)
# Reads @session_order directly for speed (no script spawn)
bind -n M-1 run-shell "tmux switch-client -t \"$(tmux show-option -gqv @session_order | tr ',' '\\\n' | sed -n '1p')\""
bind -n M-2 run-shell "tmux switch-client -t \"$(tmux show-option -gqv @session_order | tr ',' '\\\n' | sed -n '2p')\""
bind -n M-3 run-shell "tmux switch-client -t \"$(tmux show-option -gqv @session_order | tr ',' '\\\n' | sed -n '3p')\""
bind -n M-4 run-shell "tmux switch-client -t \"$(tmux show-option -gqv @session_order | tr ',' '\\\n' | sed -n '4p')\""
bind -n M-5 run-shell "tmux switch-client -t \"$(tmux show-option -gqv @session_order | tr ',' '\\\n' | sed -n '5p')\""
bind -n M-6 run-shell "tmux switch-client -t \"$(tmux show-option -gqv @session_order | tr ',' '\\\n' | sed -n '6p')\""
bind -n M-7 run-shell "tmux switch-client -t \"$(tmux show-option -gqv @session_order | tr ',' '\\\n' | sed -n '7p')\""
bind -n M-8 run-shell "tmux switch-client -t \"$(tmux show-option -gqv @session_order | tr ',' '\\\n' | sed -n '8p')\""
bind -n M-9 run-shell "tmux switch-client -t \"$(tmux show-option -gqv @session_order | tr ',' '\\\n' | sed -n '9p')\""

# Swap focused session to position (C-a 1..9)
bind 1 run-shell "$SESSION_ORDER swap-to 1"
bind 2 run-shell "$SESSION_ORDER swap-to 2"
bind 3 run-shell "$SESSION_ORDER swap-to 3"
bind 4 run-shell "$SESSION_ORDER swap-to 4"
bind 5 run-shell "$SESSION_ORDER swap-to 5"
bind 6 run-shell "$SESSION_ORDER swap-to 6"
bind 7 run-shell "$SESSION_ORDER swap-to 7"
bind 8 run-shell "$SESSION_ORDER swap-to 8"
bind 9 run-shell "$SESSION_ORDER swap-to 9"

# Sort sessions by recency (C-a s)
bind s run-shell "$SESSION_ORDER sort"

# --- Sessionbar refresh hooks ---
# sessionbar.sh syncs @session_order and renders pills in one pass.
%hidden SESSIONBAR_CMD="~/.config/dotfiles/tmux/scripts/refresh-sessionbar.sh"
set-hook -g client-session-changed "run-shell 'tmux show-option -gqv @agent_state_#{session_name} 2>/dev/null | grep -qx done && tmux set -gu @agent_state_#{session_name} 2>/dev/null; $SESSIONBAR_CMD'"
set-hook -g session-created        "run-shell '$SESSIONBAR_CMD'"
set-hook -g session-closed         "run-shell '$SESSIONBAR_CMD'"
set-hook -g session-renamed        "run-shell '$SESSIONBAR_CMD'"
set-hook -g pane-exited             "run-shell 'tmux list-panes -t \"#{session_name}\" -F \"##{pane_current_command}\" 2>/dev/null | grep -qx -e opencode -e copilot || tmux set -gu @agent_state_#{session_name} 2>/dev/null; $SESSIONBAR_CMD'"
run-shell "$SESSIONBAR_CMD"

# --- Session pills (left) + git branch & resources (right) ---
set -g status-format[0] "\
#[align=left bg=#181825]\
#{?window_zoomed_flag,#[fg=#f9e2af bold] ZOOMED #[default bg=#181825],}\
#{@sessionbar}\
#[align=right bg=#181825]\
#(~/.config/dotfiles/tmux/scripts/statusbar-right.sh)"

# Hide default status-left/right (everything is in status-format[0])
set -g status-left ""
set -g status-right ""
set -g status-right-length 0
set -g status-left-length 0

# Only show windows when session has >1 window (override catppuccin's window-status-format)
set -gF window-status-format "#{?#{==:#{session_windows},1},,#{E:window-status-format}}"
set -gF window-status-current-format "#{?#{==:#{session_windows},1},,#{E:window-status-current-format}}"
