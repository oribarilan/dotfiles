# Sessionbar — custom tmux status line showing sessions as navigable pills.
# Replaces the default window-centric status with a session-centric one,
# since each session uses a single window with multi-pane splits.
#
# Navigation:
#   Alt+, / Alt+.    prev/next session
#   Alt+1..9         jump to session by position
#   Alt+n            create new session (prompts for name)
#   Alt+q            kill current session (with confirmation)

set-option -g status-position top
set -g status on
set -g status-interval 10  # for CPU/memory refresh on the right side

# --- Sessionbar refresh hooks ---
# Update sessionbar variable on session events instead of polling.
%hidden SESSIONBAR_CMD="tmux set -g @sessionbar \"$(~/.config/dotfiles/tmux/scripts/sessionbar.sh)\" && tmux refresh-client -S"
set-hook -g client-session-changed "run-shell '$SESSIONBAR_CMD'"
set-hook -g session-created        "run-shell '$SESSIONBAR_CMD'"
set-hook -g session-closed         "run-shell '$SESSIONBAR_CMD'"
set-hook -g session-renamed        "run-shell '$SESSIONBAR_CMD'"
run-shell "$SESSIONBAR_CMD"

# --- Session pills (left) + git branch & resources (right) ---
# Git branch: updated via hooks (reads pane_current_path of active session)
# CPU/memory: polled via #() on status-interval
set -g status-format[0] "\
#[align=left bg=#181825]\
#{?window_zoomed_flag,#[fg=#f9e2af bold] ZOOMED #[default bg=#181825],}\
#{@sessionbar}\
#[align=right bg=#181825]\
#(~/.config/dotfiles/tmux/scripts/statusbar-right.sh)"

# Hide default status-left/right (everything is in status-format[0])
set -g status-left ""
set -g status-right ""
set -g status-right-length 0
set -g status-left-length 0

# Only show windows when session has >1 window (override catppuccin's window-status-format)
set -gF window-status-format "#{?#{==:#{session_windows},1},,#{E:window-status-format}}"
set -gF window-status-current-format "#{?#{==:#{session_windows},1},,#{E:window-status-current-format}}"
